<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  />

  <title>CloudCommand</title>

  <link
    rel="stylesheet"
    href="./assets/css/v-01.css?v=13"
  />

  <link
    rel="stylesheet"
    href="./assets/css/v-01-interactions.css?v=13"
  />

  <link
    rel="stylesheet"
    href="./assets/css/inspection.css?v=13"
  />
</head>

<body>
  <main
    class="cc-page-background"
    data-layer="L00_PAGE_BACKGROUND"
  >
    <section
      class="cc-app-frame"
      data-layer="L01_APP_FRAME"
    >
      <section
        class="cc-main-dashboard-window"
        data-layer="L02_MAIN_DASHBOARD_WINDOW"
      >
        <section
          class="cc-dashboard-content-space"
          data-layer="L03_STARM_VIEWPORT"
          aria-label="CloudCommand star map viewport"
        ></section>

        <section
          class="cc-terminal-shell"
          aria-label="CloudCommand terminal"
          data-terminal-state="open"
        >
          <div
            class="cc-terminal-controls"
            aria-label="Terminal controls"
          >
            <button
              class="cc-terminal-control cc-terminal-collapse"
              type="button"
              aria-label="Collapse terminal"
              title="Collapse terminal"
            ></button>

            <button
              class="cc-terminal-control cc-terminal-close"
              type="button"
              aria-label="Close terminal"
              title="Close terminal"
            ></button>
          </div>

          <div class="cc-terminal-body">
            <p>
              <span class="cc-terminal-prompt">
                cloud-command
              </span>
              boot report received
            </p>

            <p>
              <span class="cc-terminal-muted">
                runtime:
              </span>
              local control-plane prototype
            </p>

            <p>
              <span class="cc-terminal-muted">
                state:
              </span>
              waiting for operator command
            </p>

            <p>
              <span class="cc-terminal-muted">
                starm:
              </span>
              online
            </p>
          </div>
        </section>

        <form
          class="cc-command-input-shell"
          data-layer="L04_COMMAND_INPUT"
        >
          <button
            class="cc-command-logo"
            type="button"
            aria-label="Show CloudCommand terminal"
            title="Show CloudCommand terminal"
          >
            <img
              class="cc-command-logo-img"
              src="./assets/img/cloudcommand-mark.svg"
              alt=""
              aria-hidden="true"
            />

            <span class="cc-command-logo-fallback">
              CC
            </span>
          </button>

          <div class="cc-command-input-surface">
            <span
              class="cc-command-inline-prompt"
              aria-hidden="true"
            >
              cloud-command
            </span>

            <textarea
              class="cc-command-input"
              spellcheck="false"
              rows="1"
              aria-label="CloudCommand command input"
              placeholder=""
            ></textarea>
          </div>
        </form>
      </section>
    </section>
  </main>

  <script
    type="module"
    src="./assets/js/v-01.js?v=13"
  ></script>
</body>
</html>
